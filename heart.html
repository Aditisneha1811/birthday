
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise ❤️</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* -----------------------------
PAGE STYLE
----------------------------- */

body{
background:black;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
overflow:hidden;
}

/* -----------------------------
HEART BEAT ANIMATION
----------------------------- */

.heart{
font-size:220px;
cursor:pointer;
animation:beat 1.5s infinite;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

/* -----------------------------
FLOATING HEART PARTICLES
----------------------------- */

.small-heart{
position:absolute;
font-size:20px;
pointer-events:none;
}

/* Fade animation */

.fade-out{
animation:fade 1s forwards;
}

@keyframes fade{
to{opacity:0;}
}

</style>
</head>

<body>

<!-- Background Heartbeat Audio -->
<audio id="heartbeatAudio" autoplay loop>
  <source src="HEARTBEATSOUND.mp3" type="audio/mp3">
</audio>

<!-- MAIN HEART -->

<div class="heart" onclick="explodeHearts()">❤️</div>

<p class="mt-6 text-gray-300 text-lg">
Click the heart
</p>


<script>

/* --------------------------------
HEART EXPLOSION FUNCTION
-------------------------------- */
window.addEventListener("DOMContentLoaded", function () { const audio = document.getElementById("heartbeatAudio");
 audio.play().catch(() => { console.log("Autoplay issue"); }); });

function explodeHearts(){

/* stop heartbeat audio */
document.getElementById("heartbeatAudio").pause();

const heart = document.querySelector('.heart');

/* stop beating animation */
heart.style.animation="none";

/* get center position */

const rect = heart.getBoundingClientRect();
const centerX = rect.left + rect.width/2;
const centerY = rect.top + rect.height/2;

/* create heart particles */

for(let i=0;i<40;i++){

let smallHeart=document.createElement("div");

smallHeart.innerHTML="❤️";

smallHeart.className="small-heart";

smallHeart.style.left=centerX+"px";
smallHeart.style.top=centerY+"px";

let angle=Math.random()*2*Math.PI;
let distance=150+Math.random()*200;

let x=Math.cos(angle)*distance;
let y=Math.sin(angle)*distance;

smallHeart.animate(
[
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],
{
duration:1500,
easing:"ease-out"
}
);

document.body.appendChild(smallHeart);

setTimeout(()=>{
smallHeart.remove();
},1500);

}

/* fade page */

setTimeout(()=>{
document.body.classList.add("fade-out");
},1400);

/* redirect */

setTimeout(()=>{
window.location.href="index2.html";
},2300);

}

</script>

</body>
</html>
