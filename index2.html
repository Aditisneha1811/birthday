
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<style>

/* BACKGROUND */

body{
margin:0;
background:#e6d6ff; /* light purple */
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
font-family:sans-serif;
}

/* TOP TEXT */

.caption{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:20px;
font-weight:600;
color:#4b2e83;
background:rgba(255,255,255,0.6);
padding:8px 18px;
border-radius:20px;
}

/* VIDEO */

video{
width:80%;
max-width:700px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<!-- TOP TEXT -->
<div class="caption">
little editing by me 💜
</div>

<!-- VIDEO -->
<video autoplay controls>
    <source src="myvideo.mp4" type="video/mp4">
</video>

</body>
</html>
